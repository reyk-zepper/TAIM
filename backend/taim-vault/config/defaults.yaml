# TAIM — Smart Defaults
team:
  time_budget: "2h"
  token_budget: 500000
  iteration_rounds: 2
  on_limit_reached: graceful_stop

agent:
  max_iterations: 10
  default_tier: tier2_standard
  approval_gates:
    - file_deletion
    - external_communication
    - budget_exceeded

output:
  format: markdown
  language: auto

costs:
  display_currency: true
  warning_threshold: 10.00
